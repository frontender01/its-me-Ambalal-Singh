<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(10px);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            font-size: 3rem;
        }
        .skills, .tech-stack, .certifications {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .skill, .badge, .cert {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            transition: transform 0.2s;
        }
        .skill:hover, .badge:hover, .cert:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Professional Portfolio</h1>
        <h2>Skills</h2>
        <div class="skills">
            <div class="skill">Developer</div>
            <div class="skill">Photo Editor</div>
            <div class="skill">Video Editor</div>
            <div class="skill">UI Designer</div>
            <div class="skill">Data Analyst</div>
            <div class="skill">Tester</div>
            <div class="skill">Founder</div>
        </div>
        <h2>Tech Stack</h2>
        <div class="tech-stack">
            <div class="badge">HTML</div>
            <div class="badge">CSS</div>
            <div class="badge">JavaScript</div>
            <div class="badge">React</div>
            <div class="badge">Node.js</div>
        </div>
        <h2>Certifications</h2>
        <div class="certifications">
            <div class="cert">Certified Developer</div>
            <div class="cert">Certified Data Analyst</div>
        </div>
        <h2>Figma Prototypes</h2>
        <p><a href="#">View my designs on Figma</a></p>
        <h2>GitHub Stats</h2>
        <p><a href="#">GitHub Stats Link</a></p>
    </div>
</body>
</html>
